services:
  db:
    image: mysql:8.0
    container_name: interview-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - interview-network

  redis:
    image: redis:7-alpine
    container_name: interview-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - interview-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: interview-qdrant
    restart: unless-stopped
    volumes:
      - ./qdrant_data:/qdrant/storage
    networks:
      - interview-network

  backend:
    build:
      context: ./backend
    container_name: interview-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      DB_URL: jdbc:mysql://db:3306/${DB_NAME}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SIGN_KEY: ${JWT_SIGN_KEY}
      JWT_EXPIRE_MS: ${JWT_EXPIRE_MS:-86400000}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_ENABLED: ${QDRANT_ENABLED:-true}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-interview_atoms}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-384}
      QUESTION_BANK_ADMIN_TOKEN: ${QUESTION_BANK_ADMIN_TOKEN}
      MCP_READ_TOKEN: ${MCP_READ_TOKEN:-}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS}
      QUESTION_BANK_SEED_FROM_JSON: ${QUESTION_BANK_SEED_FROM_JSON:-true}
      QUESTION_BANK_REINDEX_ON_STARTUP: ${QUESTION_BANK_REINDEX_ON_STARTUP:-true}
      QUESTION_BANK_LEGACY_LOADER_ENABLED: ${QUESTION_BANK_LEGACY_LOADER_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_UPLOAD_DIR: /app/uploads
      APP_ADMIN_TOKEN: ${APP_ADMIN_TOKEN}
      APP_ANALYTICS_HASH_SALT: ${APP_ANALYTICS_HASH_SALT}
      APP_RATE_LIMIT_ENABLED: ${APP_RATE_LIMIT_ENABLED:-true}
      APP_QUOTA_ENABLED: ${APP_QUOTA_ENABLED:-true}
      APP_DAILY_INTERVIEW_LIMIT: ${APP_DAILY_INTERVIEW_LIMIT:-5}
      APP_DAILY_AI_CHAT_TURN_LIMIT: ${APP_DAILY_AI_CHAT_TURN_LIMIT:-80}
      APP_DAILY_RESUME_PARSE_LIMIT: ${APP_DAILY_RESUME_PARSE_LIMIT:-3}
      APP_DAILY_MENTOR_GENERATE_LIMIT: ${APP_DAILY_MENTOR_GENERATE_LIMIT:-3}
      APP_DEVELOPER_EXEMPT_USER_IDS: ${APP_DEVELOPER_EXEMPT_USER_IDS:-}
      APP_DEVELOPER_EXEMPT_USERNAMES: ${APP_DEVELOPER_EXEMPT_USERNAMES:-}
      APP_DEVELOPER_EXEMPT_EMAILS: ${APP_DEVELOPER_EXEMPT_EMAILS:-}
      APP_MCP_PUBLIC_URL: ${APP_MCP_PUBLIC_URL:-}
      MCP_DAILY_TOTAL_LIMIT: ${MCP_DAILY_TOTAL_LIMIT:-150}
      MCP_DAILY_SEARCH_LIMIT: ${MCP_DAILY_SEARCH_LIMIT:-80}
      MCP_DAILY_CONTEXT_LIMIT: ${MCP_DAILY_CONTEXT_LIMIT:-40}
      MCP_DAILY_DETAIL_LIMIT: ${MCP_DAILY_DETAIL_LIMIT:-60}
      MCP_DAILY_CATEGORIES_LIMIT: ${MCP_DAILY_CATEGORIES_LIMIT:-30}
      MCP_DAILY_USAGE_STATUS_LIMIT: ${MCP_DAILY_USAGE_STATUS_LIMIT:-30}
      MCP_DEVELOPER_DAILY_TOTAL_LIMIT: ${MCP_DEVELOPER_DAILY_TOTAL_LIMIT:-2000}
      MCP_DEVELOPER_DAILY_SEARCH_LIMIT: ${MCP_DEVELOPER_DAILY_SEARCH_LIMIT:-1000}
      MCP_DEVELOPER_DAILY_CONTEXT_LIMIT: ${MCP_DEVELOPER_DAILY_CONTEXT_LIMIT:-500}
      MCP_DEVELOPER_DAILY_DETAIL_LIMIT: ${MCP_DEVELOPER_DAILY_DETAIL_LIMIT:-500}
      MCP_DEVELOPER_DAILY_CATEGORIES_LIMIT: ${MCP_DEVELOPER_DAILY_CATEGORIES_LIMIT:-300}
      MCP_DEVELOPER_DAILY_USAGE_STATUS_LIMIT: ${MCP_DEVELOPER_DAILY_USAGE_STATUS_LIMIT:-300}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - interview-network

  mcp-skill:
    build:
      context: ./services/mcp-skill
    container_name: interview-mcp-skill
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8765
      QUESTION_BANK_ADMIN_TOKEN: ${QUESTION_BANK_ADMIN_TOKEN}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS}
      MCP_HASH_SALT: ${APP_ANALYTICS_HASH_SALT}
      MCP_PUBLIC_MAX_LIMIT: ${MCP_PUBLIC_MAX_LIMIT:-5}
      MCP_MAX_QUERY_LENGTH: ${MCP_MAX_QUERY_LENGTH:-1000}
      MCP_DAILY_TOTAL_LIMIT: ${MCP_DAILY_TOTAL_LIMIT:-150}
      MCP_DAILY_SEARCH_LIMIT: ${MCP_DAILY_SEARCH_LIMIT:-80}
      MCP_DAILY_CONTEXT_LIMIT: ${MCP_DAILY_CONTEXT_LIMIT:-40}
      MCP_DAILY_DETAIL_LIMIT: ${MCP_DAILY_DETAIL_LIMIT:-60}
      MCP_DAILY_CATEGORIES_LIMIT: ${MCP_DAILY_CATEGORIES_LIMIT:-30}
      MCP_DAILY_USAGE_STATUS_LIMIT: ${MCP_DAILY_USAGE_STATUS_LIMIT:-30}
      MCP_DEVELOPER_DAILY_TOTAL_LIMIT: ${MCP_DEVELOPER_DAILY_TOTAL_LIMIT:-2000}
      MCP_DEVELOPER_DAILY_SEARCH_LIMIT: ${MCP_DEVELOPER_DAILY_SEARCH_LIMIT:-1000}
      MCP_DEVELOPER_DAILY_CONTEXT_LIMIT: ${MCP_DEVELOPER_DAILY_CONTEXT_LIMIT:-500}
      MCP_DEVELOPER_DAILY_DETAIL_LIMIT: ${MCP_DEVELOPER_DAILY_DETAIL_LIMIT:-500}
      MCP_DEVELOPER_DAILY_CATEGORIES_LIMIT: ${MCP_DEVELOPER_DAILY_CATEGORIES_LIMIT:-300}
      MCP_DEVELOPER_DAILY_USAGE_STATUS_LIMIT: ${MCP_DEVELOPER_DAILY_USAGE_STATUS_LIMIT:-300}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      QDRANT_ENABLED: ${QDRANT_ENABLED:-true}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-interview_atoms}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-384}
      EMBEDDING_PROVIDER: local
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
    networks:
      - interview-network

  frontend:
    build:
      context: ./frontend
    container_name: interview-frontend
    restart: unless-stopped
    depends_on:
      - backend
      - mcp-skill
    ports:
      - "${FRONTEND_HTTP_BIND:-80}:80"
    networks:
      - interview-network

  caddy:
    image: caddy:2-alpine
    container_name: interview-caddy
    restart: unless-stopped
    profiles:
      - https
    depends_on:
      - frontend
      - mcp-skill
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
    networks:
      - interview-network

networks:
  interview-network:
    driver: bridge
