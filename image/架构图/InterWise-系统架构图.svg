<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1180" viewBox="0 0 2000 1180" role="img" aria-labelledby="title desc">
  <title id="title">InterWise 系统架构图</title>
  <desc id="desc">InterWise AI 模拟面试系统的前端、后端、AI 服务、数据层和 Azure 部署关系。</desc>
  <defs>
    <linearGradient id="headerGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .accent { fill: url(#headerGradient); }
      .title { font: 700 44px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 20px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #475569; }
      .section { fill: #ffffff; stroke: #dbe3ef; stroke-width: 2; rx: 18; }
      .section-title { font: 700 27px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 700 21px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 400 16px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #475569; }
      .small { font: 400 14px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #475569; }
      .pill { fill: #e0f2fe; stroke: #7dd3fc; stroke-width: 1.7; rx: 12; }
      .pill-green { fill: #dcfce7; stroke: #86efac; }
      .pill-orange { fill: #ffedd5; stroke: #fdba74; }
      .pill-violet { fill: #ede9fe; stroke: #c4b5fd; }
      .pill-red { fill: #fee2e2; stroke: #fca5a5; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .arrow-dashed { stroke: #64748b; stroke-width: 2.3; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .label { font: 700 15px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #334155; }
      .legend { font: 400 16px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" width="2000" height="1180"/>
  <rect class="accent" width="2000" height="14"/>
  <text class="title" x="70" y="76">InterWise 系统架构图</text>
  <text class="subtitle" x="72" y="116">Vue 3 前端 + Spring Boot 后端 + DeepSeek + MySQL / Redis / Qdrant，面向 Azure 单机 Docker Compose 内测部署。</text>

  <rect class="section" x="58" y="162" width="360" height="330"/>
  <text class="section-title" x="88" y="210">用户入口</text>
  <rect class="pill" x="90" y="244" width="296" height="76"/>
  <text class="box-title" x="118" y="276">浏览器用户</text>
  <text class="box-text" x="118" y="302">注册登录 / 简历 / 面试</text>
  <rect class="pill pill-green" x="90" y="346" width="296" height="98"/>
  <text class="box-title" x="118" y="378">开发者账号</text>
  <text class="box-text" x="118" y="404">Settings 中进入 Operations</text>
  <text class="box-text" x="118" y="428">token + 白名单校验</text>

  <rect class="section" x="476" y="162" width="380" height="330"/>
  <text class="section-title" x="506" y="210">公网与静态入口</text>
  <rect class="pill pill-violet" x="508" y="244" width="316" height="96"/>
  <text class="box-title" x="536" y="276">Azure DNS / HTTPS</text>
  <text class="small" x="536" y="302">interwise.japaneast</text>
  <text class="small" x="536" y="324">.cloudapp.azure.com</text>
  <rect class="pill" x="508" y="366" width="316" height="78"/>
  <text class="box-title" x="536" y="398">Caddy / Nginx</text>
  <text class="box-text" x="536" y="424">TLS 终止 + 前端静态资源</text>

  <rect class="section" x="914" y="162" width="400" height="330"/>
  <text class="section-title" x="944" y="210">Vue 3 前端</text>
  <rect class="pill" x="946" y="244" width="336" height="76"/>
  <text class="box-title" x="974" y="276">应用页面</text>
  <text class="box-text" x="974" y="302">首页 / 面试 / 简历 / Mentor / 设置</text>
  <rect class="pill pill-green" x="946" y="346" width="336" height="98"/>
  <text class="box-title" x="974" y="378">浏览器能力</text>
  <text class="box-text" x="974" y="404">SSE / Web Speech / 摄像头</text>
  <text class="box-text" x="974" y="428">ECharts 统计与反馈入口</text>

  <rect class="section" x="1372" y="136" width="560" height="382"/>
  <text class="section-title" x="1402" y="184">Spring Boot 后端</text>
  <rect class="pill" x="1410" y="220" width="230" height="88"/>
  <text class="box-title" x="1438" y="254">Controller</text>
  <text class="box-text" x="1438" y="280">REST / SSE / MCP</text>
  <rect class="pill pill-green" x="1670" y="220" width="230" height="88"/>
  <text class="box-title" x="1698" y="254">Service</text>
  <text class="box-text" x="1698" y="280">面试 / 简历 / Mentor</text>
  <rect class="pill pill-orange" x="1410" y="340" width="230" height="100"/>
  <text class="box-title" x="1438" y="374">AI 编排</text>
  <text class="box-text" x="1438" y="400">InterviewPhase 状态机</text>
  <text class="box-text" x="1438" y="424">RAG 追问 / 报告生成</text>
  <rect class="pill pill-red" x="1670" y="340" width="230" height="100"/>
  <text class="box-title" x="1698" y="374">安全与治理</text>
  <text class="box-text" x="1698" y="400">JWT / 额度 / 限流</text>
  <text class="box-text" x="1698" y="424">事件统计 / 反馈</text>
  <text class="legend" x="1410" y="470">核心原则：Controller 只做入口，Service 编排业务。</text>
  <text class="legend" x="1410" y="494">数据连接和密钥全部通过环境变量注入。</text>

  <path class="arrow" d="M418 326 L476 326"/>
  <text class="label" x="430" y="304">HTTPS</text>
  <path class="arrow" d="M856 326 L914 326"/>
  <text class="label" x="868" y="304">静态资源</text>
  <path class="arrow" d="M1314 326 L1372 326"/>
  <text class="label" x="1324" y="304">HTTP / SSE</text>

  <rect class="section" x="58" y="640" width="1874" height="394"/>
  <text class="section-title" x="88" y="688">数据层、AI 服务与外部集成</text>

  <rect class="pill pill-orange" x="96" y="730" width="306" height="120"/>
  <text class="box-title" x="128" y="764">DeepSeek API</text>
  <text class="box-text" x="128" y="792">面试提问 / 追问</text>
  <text class="box-text" x="128" y="818">报告、Mentor 建议</text>

  <rect class="pill" x="448" y="730" width="306" height="120"/>
  <text class="box-title" x="480" y="764">MySQL 8</text>
  <text class="box-text" x="480" y="792">用户、面试记录</text>
  <text class="box-text" x="480" y="818">题库、RAG 日志、统计</text>

  <rect class="pill pill-green" x="800" y="730" width="306" height="120"/>
  <text class="box-title" x="832" y="764">Redis 7</text>
  <text class="box-text" x="832" y="792">会话缓存、Mentor 缓存</text>
  <text class="box-text" x="832" y="818">限流计数、每日额度</text>

  <rect class="pill pill-violet" x="1152" y="730" width="306" height="120"/>
  <text class="box-title" x="1184" y="764">Qdrant</text>
  <text class="box-text" x="1184" y="792">题库向量索引</text>
  <text class="box-text" x="1184" y="818">Top-K 语义检索</text>

  <rect class="pill" x="1504" y="730" width="306" height="120"/>
  <text class="box-title" x="1536" y="764">文件与邮件</text>
  <text class="box-text" x="1536" y="792">uploads 简历文件</text>
  <text class="box-text" x="1536" y="818">SMTP 验证码 / 找回密码</text>

  <rect class="pill pill-red" x="250" y="902" width="430" height="78"/>
  <text class="box-title" x="282" y="934">内网隔离</text>
  <text class="box-text" x="282" y="960">后端、MySQL、Redis、Qdrant 仅 Docker 内网可达</text>
  <rect class="pill pill-green" x="786" y="902" width="430" height="78"/>
  <text class="box-title" x="818" y="934">公网暴露</text>
  <text class="box-text" x="818" y="960">只开放 80 / 443，由 Caddy 转发到前端</text>
  <rect class="pill pill-violet" x="1322" y="902" width="430" height="78"/>
  <text class="box-title" x="1354" y="934">HTTPS 能力</text>
  <text class="box-text" x="1354" y="960">保障视频面试与浏览器媒体 API</text>

  <path class="arrow-dashed" d="M1460 518 C1180 610, 540 620, 250 730"/>
  <text class="label" x="650" y="612">LLM 调用</text>
  <path class="arrow-dashed" d="M1520 518 C1320 604, 790 620, 600 730"/>
  <text class="label" x="950" y="612">JDBC / MyBatis-Plus</text>
  <path class="arrow-dashed" d="M1620 518 C1460 604, 1010 622, 950 730"/>
  <text class="label" x="1190" y="622">缓存 / 限流</text>
  <path class="arrow-dashed" d="M1710 518 C1610 610, 1350 628, 1305 730"/>
  <text class="label" x="1460" y="632">向量检索</text>
  <path class="arrow-dashed" d="M1810 518 C1880 600, 1720 650, 1658 730"/>
  <text class="label" x="1740" y="636">SMTP / 上传</text>

  <text class="legend" x="86" y="1102">生产环境：Azure Ubuntu VM + Docker Compose；配置来自 .env，敏感值不进入 Git。</text>
  <text class="legend" x="86" y="1130">职责边界：MySQL 保存业务真相，Qdrant 保存语义索引，Redis 承担缓存与成本保护。</text>
</svg>
