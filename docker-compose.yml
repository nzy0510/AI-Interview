services:
  db:
    image: mysql:5.7
    container_name: interview-db
    environment:
      MYSQL_DATABASE: ai_interview_ds
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: nzy333
      MYSQL_PASSWORD: ${DB_PASSWORD:-NZY@0510}
    ports:
      - "3307:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - interview-network

  backend:
    build:
      context: ./backend
    container_name: interview-backend
    depends_on:
      - db
    environment:
      DB_URL: jdbc:mysql://${DB_HOST:-db}:3306/${DB_NAME:-ai_interview_ds}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      DB_USERNAME: ${DB_USERNAME:-nzy333}
      DB_PASSWORD: ${DB_PASSWORD:-NZY@0510}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    networks:
      - interview-network

  frontend:
    build:
      context: ./frontend
    container_name: interview-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - interview-network

networks:
  interview-network:
    driver: bridge
